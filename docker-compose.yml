services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webapp_backend
    networks:
      - app-network

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    container_name: webapp_frontend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
